# Secrets for the IDFC services. THIS FILE HOLDS PLACEHOLDER VALUES ONLY.
#
# In a real cluster do NOT commit real secrets here — source them from AWS
# Secrets Manager / SSM via the External Secrets Operator, or `kubectl create
# secret`, so they never live in git. The keys below are the env-var names the
# services read.
#
# Example (out-of-band, not committed):
#   kubectl -n idfc create secret generic idfc-platform-secrets \
#     --from-literal=SFDC_EDGE_TOKEN=... \
#     --from-literal=CRED_TOKEN=... \
#     --from-literal=FINNONE_DB_PASSWORD=...
apiVersion: v1
kind: Secret
metadata:
  name: idfc-platform-secrets
  namespace: idfc
type: Opaque
stringData:
  # Assisted edge inbound auth token (SFDC -> sfdc-ingress-edge)
  SFDC_EDGE_TOKEN: "CHANGE_ME"
  # Digital partner inbound tokens (partner -> digital-partner-edge)
  CRED_TOKEN: "CHANGE_ME"
  FLIPKART_TOKEN: "CHANGE_ME"
  GROWW_TOKEN: "CHANGE_ME"
  # FinnOne (Oracle) booking DB password
  FINNONE_DB_PASSWORD: "CHANGE_ME"
