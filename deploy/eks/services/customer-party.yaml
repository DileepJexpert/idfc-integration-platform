apiVersion: apps/v1
kind: Deployment
metadata:
  name: customer-party
  namespace: idfc
  labels: { app: customer-party, tier: capability, platform: idfc-integration }
spec:
  replicas: 2
  selector:
    matchLabels: { app: customer-party }
  template:
    metadata:
      labels: { app: customer-party, tier: capability }
    spec:
      containers:
        - name: customer-party
          image: idfc/customer-party:0.1.0-SNAPSHOT   # over/registry set via kustomize images:
          imagePullPolicy: IfNotPresent
          ports:
            - { name: http, containerPort: 8090 }
          env:
            - { name: SPRING_PROFILES_ACTIVE, value: eks }
            - { name: SERVER_PORT, value: "8090" }
          envFrom:
            - configMapRef: { name: idfc-platform-config }
            - secretRef: { name: idfc-platform-secrets }
          readinessProbe:
            httpGet: { path: /actuator/health/readiness, port: 8090 }
            initialDelaySeconds: 20
            periodSeconds: 10
          livenessProbe:
            httpGet: { path: /actuator/health/liveness, port: 8090 }
            initialDelaySeconds: 40
            periodSeconds: 15
          resources:
            requests: { cpu: "250m", memory: "512Mi" }
            limits:   { cpu: "1",    memory: "1Gi"  }
---
apiVersion: v1
kind: Service
metadata:
  name: customer-party
  namespace: idfc
  labels: { app: customer-party }
spec:
  type: ClusterIP
  selector: { app: customer-party }
  ports:
    - { name: http, port: 80, targetPort: 8090 }
