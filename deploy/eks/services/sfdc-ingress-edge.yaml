apiVersion: apps/v1
kind: Deployment
metadata:
  name: sfdc-ingress-edge
  namespace: idfc
  labels: { app: sfdc-ingress-edge, tier: edge, platform: idfc-integration }
spec:
  replicas: 2
  selector:
    matchLabels: { app: sfdc-ingress-edge }
  template:
    metadata:
      labels: { app: sfdc-ingress-edge, tier: edge }
    spec:
      containers:
        - name: sfdc-ingress-edge
          image: idfc/sfdc-ingress-edge:0.1.0-SNAPSHOT   # over/registry set via kustomize images:
          imagePullPolicy: IfNotPresent
          ports:
            - { name: http, containerPort: 8080 }
          env:
            - { name: SPRING_PROFILES_ACTIVE, value: eks }
            - { name: SERVER_PORT, value: "8080" }
          envFrom:
            - configMapRef: { name: idfc-platform-config }
            - secretRef: { name: idfc-platform-secrets }
          readinessProbe:
            httpGet: { path: /actuator/health/readiness, port: 8080 }
            initialDelaySeconds: 20
            periodSeconds: 10
          livenessProbe:
            httpGet: { path: /actuator/health/liveness, port: 8080 }
            initialDelaySeconds: 40
            periodSeconds: 15
          resources:
            requests: { cpu: "250m", memory: "512Mi" }
            limits:   { cpu: "1",    memory: "1Gi"  }
---
apiVersion: v1
kind: Service
metadata:
  name: sfdc-ingress-edge
  namespace: idfc
  labels: { app: sfdc-ingress-edge }
spec:
  type: ClusterIP
  selector: { app: sfdc-ingress-edge }
  ports:
    - { name: http, port: 80, targetPort: 8080 }
