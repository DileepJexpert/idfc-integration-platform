server:
  port: ${SERVER_PORT:8080}   # assisted (SFDC) edge — REST in

spring:
  application:
    name: sfdc-ingress-edge
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.StringSerializer
      acks: all                       # don't consider a publish done until replicated
    consumer:
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      auto-offset-reset: earliest
      # container-managed commits so the DefaultErrorHandler can retry/DLQ
      enable-auto-commit: false

# Actuator locked down: health/info/metrics only, never env/heapdump/etc.
management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  endpoint:
    health:
      probes:
        enabled: true
      show-details: never

idfc:
  aerospike:
    host: ${AEROSPIKE_HOST:localhost}
    port: ${AEROSPIKE_PORT:3000}
    namespace: ${AEROSPIKE_NAMESPACE:idfc}
    record-set: idem
    app-pointer-set: idem_app
    # TTL MUST exceed SFDC's confirmed max retry window (A1). 30d placeholder.
    ttl-seconds: ${IDEMPOTENCY_TTL_SECONDS:2592000}
  edge:
    auth:
      # FAIL CLOSED: no compiled-in default. A missing SFDC_EDGE_TOKEN refuses to
      # start (see EdgeProperties). Local dev/compose set an explicit dev value;
      # EKS injects it from the idfc-platform-secrets Secret.
      expected-token: ${SFDC_EDGE_TOKEN:}
    poison-redelivery-threshold: 5    # C5 edge poison breaker N
    max-journey-retry: 1              # C3 transient journey re-enqueue ceiling
    dlq-topic: orig.sfdc.dlq.v1
    finnone:
      max-concurrency: 4             # backpressure cap N (§G)
      consume-topics: orig.sfdc.pl.v1,orig.sfdc.lap.v1,orig.sfdc.bl.v1,orig.sfdc.commercial.v1
    # Seed routing map (§E): adding a business line is a CONFIG row, not code.
    routing:
      - type: PERSONAL_LOAN
        topic: orig.sfdc.pl.v1
        downstream-journey: origination-journey
      - type: LAP
        topic: orig.sfdc.lap.v1
        downstream-journey: origination-journey
      - type: BUSINESS_LOAN
        topic: orig.sfdc.bl.v1
        downstream-journey: origination-journey
      - type: COMMERCIAL
        topic: orig.sfdc.commercial.v1
        downstream-journey: origination-journey
      # SOAP Outbound Message routing key = SVCNAME__c (normalisation spec §4).
      # New SVCNAME = a config ROW, not code. Two KINDS of target exist:
      #   * a JOURNEY  — Inbound_Wrapper (CASA account creation) → an origination
      #     journey. Publishes to an engine-consumed topic; the engine's
      #     type->journey map is empty so it resolves the loaded loan-origination
      #     journey (end-to-end plumbing proof; a real account-creation journey is
      #     a later, additive config change).
      #   * a CAPABILITY ACTION — SENDSMS (OTP/notification) → a Communications
      #     capability. Not every SVCNAME is a journey; some are fire-and-forget
      #     comms. Publishes to the comms topic; a Communications capability (mock
      #     today) consumes it. The edge stays schema-agnostic: it carries the Task
      #     CDATA as an OPAQUE payload and the capability reads Mobile__c/Description.
      - type: Inbound_Wrapper
        topic: orig.sfdc.pl.v1
        downstream-journey: loan-origination
      - type: SENDSMS
        topic: comm.sms.send.v1
        downstream-journey: communications
    # Known orgs (org-config-as-data). Unknown org -> refresh+recheck -> DLQ (C2).
    known-orgs:
      - ORG1
      - IDFC_RETAIL
      - IDFC_BUSINESS
      - 00D6D00000020HoUAI   # golden-fixture SFDC OrganizationId (account-creation)
      - 00DC40000014dS1MAI   # golden-fixture SFDC OrganizationId (CD sandbox / SENDSMS)

# --- Error/flow tracking (added platform-wide) ----------------------------------
# Readable console pattern incl. the journey correlationId from MDC (when present),
# so errors are easy to trace across services. Levels overridable via env.
logging:
  level:
    root: ${LOG_LEVEL_ROOT:INFO}
    com.idfcfirstbank: ${LOG_LEVEL_APP:INFO}
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} %-5level [${spring.application.name:-app}] [%X{correlationId:-}] %logger{36} - %msg%n"
