# LOCAL profile — run this service on your machine against the
# docker-compose infra:  docker compose -f docker-compose.infra.yml up -d
# Kafka is reached via the HOST listener (29092); the INTERNAL listener
# (kafka:9092) only resolves inside the docker network.

spring:
  kafka:
    bootstrap-servers: localhost:29092

# Explicit LOCAL-DEV auth token. The base config has NO default (the app fails
# closed when SFDC_EDGE_TOKEN is unset); activating the local profile is the
# opt-in that supplies a dev value.
idfc:
  edge:
    auth:
      expected-token: ${SFDC_EDGE_TOKEN:dev-token}
