server:
  port: ${SERVER_PORT:8081}   # digital edge — distinct from the SFDC edge (8080)

spring:
  application:
    name: digital-partner-edge
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.StringSerializer
      acks: all
    consumer:
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      auto-offset-reset: earliest

idfc:
  digital-edge:
    decision-topic: orig.decision.v1
    # Partner registry as config-as-data — onboarding a partner is a row, not a service.
    # FAIL CLOSED: no compiled-in token defaults. A configured partner with a missing
    # <CODE>_TOKEN refuses to start (see DigitalEdgeProperties). Local dev/compose set
    # explicit dev values; EKS injects them from the idfc-platform-secrets Secret.
    partners:
      - code: CRED
        token: ${CRED_TOKEN:}
        callback-url: ${CRED_CALLBACK:http://localhost:9201/cred/callback}
      - code: FLIPKART
        token: ${FLIPKART_TOKEN:}
        callback-url: ${FLIPKART_CALLBACK:http://localhost:9202/flipkart/callback}
      - code: GROWW
        token: ${GROWW_TOKEN:}
        callback-url: ${GROWW_CALLBACK:http://localhost:9203/groww/callback}
    # SAME routing as the SFDC edge: a businessLine type -> the SAME origination topic.
    routing:
      - { type: PERSONAL_LOAN, topic: orig.sfdc.pl.v1 }
      - { type: LAP, topic: orig.sfdc.lap.v1 }
      - { type: BUSINESS_LOAN, topic: orig.sfdc.bl.v1 }
      - { type: COMMERCIAL, topic: orig.sfdc.commercial.v1 }
    aerospike:
      host: ${AEROSPIKE_HOST:localhost}
      port: ${AEROSPIKE_PORT:3000}
      namespace: ${AEROSPIKE_NAMESPACE:idfc}
      # SAME platform idempotency sets as the SFDC edge — partner & assisted resends
      # dedupe against the one platform store.
      notification-set: idem
      application-set: idem_app
      ttl-seconds: ${IDEMPOTENCY_TTL_SECONDS:2592000}
  # --- digital-lending SYNC lane (this edge also hosts the synchronous doors) ---
  # FAIL CLOSED: no compiled-in default. A missing SYNC_EDGE_ACCEPTED_TOKENS accepts
  # nothing. Comma-separated Ory/Hydra tokens; local dev sets a dev value. Production
  # swaps the allow-list for real Kong/Hydra token introspection.
  sync-edge:
    auth:
      accepted-tokens: ${SYNC_EDGE_ACCEPTED_TOKENS:}
  # Audited /ops surface for the sync-lane invocation records. FAIL CLOSED: no
  # compiled-in default — a blank token authorizes nothing. Same X-Ops-Token (+
  # X-User-Id actor) the journey ops view uses; local dev sets a dev value.
  ops:
    auth-token: ${OPS_API_TOKEN:}
    # The sync-invocations view is a browser app — CORS is required or the cross-origin
    # read is blocked (curl still works). Dev default = any localhost port; prod narrows
    # it to the real ops-view origin(s), comma-separated.
    cors-allowed-origin-patterns: "${OPS_CORS_ALLOWED_ORIGINS:http://localhost:[*]}"

# The SYNC capabilities the edge invokes in-thread. Vendor hosts + auth are config
# (real IMPS/LMS backends later = host swaps); timeouts are mandatory (the caller
# blocks). In dev the vendors are the compose WireMocks (mock-imps :19110 / mock-lms
# :19111) — only their DATA is mocked.
imps-disbursal:
  vendor-base-url: ${IMPS_VENDOR_URL:http://localhost:19110}
  vendor-auth-token: ${IMPS_VENDOR_TOKEN:}
  connect-timeout-ms: 3000
  read-timeout-ms: 10000

lms-utilities:
  vendor-base-url: ${LMS_VENDOR_URL:http://localhost:19111}
  vendor-auth-token: ${LMS_VENDOR_TOKEN:}
  connect-timeout-ms: 3000
  read-timeout-ms: 10000
  # requestCode dispatch is config: adding OFFER_CHECK's siblings (balance,
  # foreclosure, schedule, …) is a row here + a stub — NOT code. Unknown -> fail closed.
  known-request-codes:
    - OFFER_CHECK

# SFDC user-management SYNC capability (the JMI-migration APIs for SFDC user/role/
# profile ops). svcName selects the OPERATION (a per-svcName route row, like the
# verification capability). The request's ORG NAME selects WHICH SFDC org instance to
# call — org-as-egress-target, this platform's ONE scoped exception to "org is never a
# routing key" (see SfdcOrgRouteResolver). The `orgs` table is a CURATED ALLOW-LIST:
# endpoints are OUR config, never the message; an unknown/disabled org fails closed and
# there is NO default org. Timeouts are mandatory (the caller blocks). In dev the orgs
# are the compose WireMocks (mock-sfdc-org-a :19112 / mock-sfdc-org-b :19113) — only
# their DATA is mocked; real SFDC orgs later = host+token swaps here, no code. Slice 1
# ships ONE read svcName; writes (idempotent) are slice 2. The SFDC path is a
# placeholder pending the JMI-confirmed contract.
sfdc-user-mgmt:
  connect-timeout-ms: 3000
  read-timeout-ms: 10000
  routes:
    - { svcName: SFDC_USER_FETCH, path: /services/apexrest/usermgmt/user/fetch, write: false }
  orgs:
    - { orgName: ORG_A, baseUrl: "${SFDC_ORG_A_URL:http://localhost:19112}", authType: BEARER, authToken: "${SFDC_ORG_A_TOKEN:}", enabled: true }
    - { orgName: ORG_B, baseUrl: "${SFDC_ORG_B_URL:http://localhost:19113}", authType: BEARER, authToken: "${SFDC_ORG_B_TOKEN:}", enabled: true }

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  endpoint:
    health:
      probes:
        enabled: true

# --- Error/flow tracking (added platform-wide) ----------------------------------
# Readable console pattern incl. the journey correlationId from MDC (when present),
# so errors are easy to trace across services. Levels overridable via env.
logging:
  level:
    root: ${LOG_LEVEL_ROOT:INFO}
    com.idfcfirstbank: ${LOG_LEVEL_APP:INFO}
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} %-5level [${spring.application.name:-app}] [%X{correlationId:-}] %logger{36} - %msg%n"
