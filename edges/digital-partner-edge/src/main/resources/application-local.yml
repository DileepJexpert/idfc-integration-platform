# LOCAL profile — run this service on your machine against the
# docker-compose infra:  docker compose -f docker-compose.infra.yml up -d
# Kafka is reached via the HOST listener (29092); the INTERNAL listener
# (kafka:9092) only resolves inside the docker network.

spring:
  kafka:
    bootstrap-servers: localhost:29092

# Explicit LOCAL-DEV partner tokens. The base config has NO defaults (the app
# fails closed when any configured partner's <CODE>_TOKEN is unset); activating
# the local profile is the opt-in that supplies dev values. Spring replaces the
# whole list, so the rows are re-declared here in full.
idfc:
  digital-edge:
    partners:
      - code: CRED
        token: ${CRED_TOKEN:cred-dev-token}
        callback-url: ${CRED_CALLBACK:http://localhost:9201/cred/callback}
      - code: FLIPKART
        token: ${FLIPKART_TOKEN:flipkart-dev-token}
        callback-url: ${FLIPKART_CALLBACK:http://localhost:9202/flipkart/callback}
      - code: GROWW
        token: ${GROWW_TOKEN:groww-dev-token}
        callback-url: ${GROWW_CALLBACK:http://localhost:9203/groww/callback}
  # DEV ONLY accepted Bearer for the sync lane (base fails closed without one).
  # Call impsFT / callLmsUtilities with `Authorization: Bearer dev-sync-token`.
  sync-edge:
    auth:
      accepted-tokens: ${SYNC_EDGE_ACCEPTED_TOKENS:dev-sync-token}
