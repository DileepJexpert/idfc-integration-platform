server:
  port: ${SERVER_PORT:8112}   # file-batch ingress edge (health/metrics only)

spring:
  application:
    name: file-batch-edge
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.StringSerializer

# Local-folder CSV ingress (NOT the production SFTP edge — census-gated).
# Disabled by default: turn on with --file-batch.enabled=true (see demo/README.md).
file-batch:
  enabled: ${FILE_BATCH_ENABLED:false}
  inbox-dir: ${FILE_BATCH_INBOX:demo/batch-inbox}
  poll-ms: 2000
  origination-topic: orig.employee-lwd-update.v1
  type: EMPLOYEE_LWD_UPDATE
  org-id: HR-DEMO

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  endpoint:
    health:
      probes:
        enabled: true

logging:
  level:
    root: ${LOG_LEVEL_ROOT:INFO}
    com.idfcfirstbank: ${LOG_LEVEL_APP:INFO}
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} %-5level [${spring.application.name:-app}] [%X{correlationId:-}] %logger{36} - %msg%n"
