server:
  port: ${SERVER_PORT:8101}   # communications capability (health/metrics only)

spring:
  application:
    name: communications
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    consumer:
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      auto-offset-reset: earliest
      enable-auto-commit: true

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  endpoint:
    health:
      probes:
        enabled: true

idfc:
  communications:
    # The topic the SFDC edge routes SENDSMS to (SVCNAME -> topic, config-as-data).
    sms-topic: ${IDFC_COMM_SMS_TOPIC:comm.sms.send.v1}
    group: ${IDFC_COMM_GROUP:communications}

logging:
  level:
    com.idfcfirstbank.integration.capabilities.communications: INFO
