server:
  port: ${SERVER_PORT:8110}   # device-financing capability (health/metrics only)

spring:
  application:
    name: device-financing
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    consumer:
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      auto-offset-reset: earliest
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.StringSerializer

# ---------------------------------------------------------------------------
# THE BRAND TABLE. In the legacy estate each of these was a per-brand JSON
# config file consumed by a dedicated service (26 brands). Here: rows against
# ONE capability + ONE journey. The vendor is reached over REAL HTTP (the
# mock-vendors server in dev) — only the response DATA is mocked. A brand row
# carries its auth SCHEME (real BASIC/OAUTH/NA) and the per-brand pass-logic
# field path. ADDING A BRAND IS ADDING A ROW (see HISENSE in demo/README.md).
# ---------------------------------------------------------------------------
device-financing:
  # The vendor is the compose WireMock (mock-devicefin) in dev — only its DATA is
  # mocked. Host bootRun -> localhost:9106; in-container -> http://mock-devicefin:8080.
  vendor-base-url: ${DEVICE_FINANCING_VENDOR_URL:http://localhost:9106/vendor/device-financing}
  token-url: ${DEVICE_FINANCING_OAUTH_URL:http://localhost:9106/oauth/token}
  connect-timeout-ms: 3000
  read-timeout-ms: 10000
  # svcName (SFDC SVCNAME__c = envelope type) -> brand row. The REAL SFDC door
  # carries brand IMPLICITLY in the svcName; the payload has no brand field. The
  # demo Kafka door still sends brand in the payload directly (this map is only
  # the fallback). Siblings (other brands / a pre-disbursal svcName) are added as
  # ROWS as IDFC confirms them — do NOT invent svcNames.
  brands:
    # Apple post-disbursal device financing (the REAL SFDC front door). The real
    # request carries NO brand field — brand is implicit in the svcName, so this
    # row declares its svc-name (Post_Disbursal_Apple) and the capability derives
    # brand=APPLE from it. Post-disbursal = a SINGLE vendor confirmation call, so
    # validation-required=false (block-only path, like GODREJ). auth-type/pass-path/
    # pass-value are PLACEHOLDERS for the mock vendor — swap to Apple's real vendor
    # host + contract when IDFC confirms it (only the vendor DATA is mocked today).
    APPLE:
      svc-name: Post_Disbursal_Apple
      auth-type: OAUTH
      validation-required: false
      pass-path: respCode
      pass-value: "0"
      scope: device-financing.apple
    SAMSUNG:
      auth-type: OAUTH          # real client-credentials: fetch token, then Bearer
      validation-required: true # activities: validation + block
      pass-path: respCode
      pass-value: "0"
      scope: device-financing.samsung
    GODREJ:
      auth-type: NA             # legacy: validation_flag=N, block-only, no auth
      validation-required: false
      pass-path: status
      pass-value: OK
    BOSCH:
      auth-type: BAUTH          # legacy spelling; real Basic auth header
      validation-required: true
      pass-path: result.code    # the per-brand pass-logic FIELD PATH differs
      pass-value: S
      basic-user: bosch-demo
      basic-password: bosch-secret

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  endpoint:
    health:
      probes:
        enabled: true

logging:
  level:
    root: ${LOG_LEVEL_ROOT:INFO}
    com.idfcfirstbank: ${LOG_LEVEL_APP:INFO}
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} %-5level [${spring.application.name:-app}] [%X{correlationId:-}] %logger{36} - %msg%n"
