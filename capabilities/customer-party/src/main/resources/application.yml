server:
  port: ${SERVER_PORT:8090}   # capability

spring:
  application:
    name: customer-party
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    consumer:
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      auto-offset-reset: earliest
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.StringSerializer

# Posidex (customer source of truth): mock locally, real (docker/prod) via URL.
idfc:
  customer-party:
    posidex:
      mode: ${POSIDEX_MODE:mock}
      url: ${POSIDEX_URL:http://localhost:19101}

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus   # locked down: no env/heapdump/etc.
  endpoint:
    health:
      probes:
        enabled: true

# --- Error/flow tracking (added platform-wide) ----------------------------------
# Readable console pattern incl. the journey correlationId from MDC (when present),
# so errors are easy to trace across services. Levels overridable via env.
logging:
  level:
    root: ${LOG_LEVEL_ROOT:INFO}
    com.idfcfirstbank: ${LOG_LEVEL_APP:INFO}
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} %-5level [${spring.application.name:-app}] [%X{correlationId:-}] %logger{36} - %msg%n"
