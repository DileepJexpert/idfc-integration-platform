server:
  port: ${SERVER_PORT:8113}   # imps-disbursal sync lane (REST in)

spring:
  application:
    name: imps-disbursal

# ---------------------------------------------------------------------------
# The digital-lending SYNC IMPS fund-transfer lane. The vendor host + auth are
# CONFIG (real IMPS backend later = a host swap, no code change); the timeouts
# are MANDATORY (the partner blocks on the response). auth.accepted-tokens is the
# fail-closed Bearer allow-list — EMPTY by default (nothing is accepted). Local
# dev/compose set an explicit dev token; production swaps in real Ory/Hydra (Kong)
# token introspection.
# ---------------------------------------------------------------------------
imps-disbursal:
  # The IMPS/FT backend. dev = the compose WireMock (mock-imps) — only DATA mocked.
  # Host bootRun -> localhost:9110; in-container -> http://mock-imps:8080.
  vendor-base-url: ${IMPS_VENDOR_URL:http://localhost:9110}
  # Bearer sent to the backend if it requires one (the mock does not). Real host later.
  vendor-auth-token: ${IMPS_VENDOR_TOKEN:}
  connect-timeout-ms: 3000
  read-timeout-ms: 10000
  auth:
    # FAIL CLOSED: no compiled-in default. A missing IMPS_EDGE_ACCEPTED_TOKENS
    # accepts nothing. Comma-separated Ory/Hydra tokens; dev sets a dev value.
    accepted-tokens: ${IMPS_EDGE_ACCEPTED_TOKENS:}

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  endpoint:
    health:
      probes:
        enabled: true

logging:
  level:
    root: ${LOG_LEVEL_ROOT:INFO}
    com.idfcfirstbank: ${LOG_LEVEL_APP:INFO}
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} %-5level [${spring.application.name:-app}] [%X{correlationId:-}] %logger{36} - %msg%n"
