server:
  port: ${SERVER_PORT:8111}   # fusion-hcm capability (health/metrics only)

spring:
  application:
    name: fusion-hcm
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    consumer:
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      auto-offset-reset: earliest
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.StringSerializer

# The Fusion HCM vendor — reached over REAL HTTP (only its response DATA is
# mocked in dev, on the compose WireMock). Real client + timeouts + status→class.
fusion:
  # Host bootRun -> localhost:9107; in-container -> http://mock-fusion:8080.
  base-url: ${FUSION_VENDOR_URL:http://localhost:9107/vendor/fusion}
  connect-timeout-ms: 3000
  read-timeout-ms: 10000

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  endpoint:
    health:
      probes:
        enabled: true

logging:
  level:
    root: ${LOG_LEVEL_ROOT:INFO}
    com.idfcfirstbank: ${LOG_LEVEL_APP:INFO}
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} %-5level [${spring.application.name:-app}] [%X{correlationId:-}] %logger{36} - %msg%n"
