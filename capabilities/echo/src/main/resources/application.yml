server:
  port: ${SERVER_PORT:8097}   # echo capability (health/metrics only)

spring:
  application:
    name: echo
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    consumer:
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      auto-offset-reset: earliest
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.StringSerializer

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  endpoint:
    health:
      probes:
        enabled: true

# --- Error/flow tracking (added platform-wide) ----------------------------------
# Readable console pattern incl. the journey correlationId from MDC (when present),
# so errors are easy to trace across services. Levels overridable via env.
logging:
  level:
    root: ${LOG_LEVEL_ROOT:INFO}
    com.idfcfirstbank: ${LOG_LEVEL_APP:INFO}
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} %-5level [${spring.application.name:-app}] [%X{correlationId:-}] %logger{36} - %msg%n"
