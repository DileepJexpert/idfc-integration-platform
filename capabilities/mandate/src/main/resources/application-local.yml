# LOCAL profile — run this capability on the HOST against the docker-compose infra.
# Kafka is reached via the HOST listener (29092); the INTERNAL listener (kafka:9092)
# only resolves inside the docker network. The autopay-link + mandate store are
# mock/in-memory adapters (no external NPCI/vendor call), so no host override needed.
spring:
  kafka:
    bootstrap-servers: localhost:29092
