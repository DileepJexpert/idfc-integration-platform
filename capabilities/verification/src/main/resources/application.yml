server:
  port: ${SERVER_PORT:8102}   # verification capability (health/metrics only)

spring:
  application:
    name: verification
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    consumer:
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      auto-offset-reset: earliest
      enable-auto-commit: true
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.StringSerializer

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  endpoint:
    health:
      probes:
        enabled: true

idfc:
  verification:
    # CONTROL-PLANE routing (correction #1): svcName -> endpoint/auth is OUR config,
    # NOT taken from the inbound message. The real source is the route-config registry
    # (open input D#2); this config-as-data adapter is the seam until that lands.
    routes:
      - svc-name: ECHO
        base-url: http://echo.mock/echo   # step-1 shell proof (trivial echo svcName)
        auth-type: NONE
      - svc-name: KARZA_VAHAN_RC          # step 2: Vehicle RC (Karza, OAuth Bearer)
        base-url: ${KARZA_VAHAN_RC_URL:http://mock-karza:8080/karza/vahan-rc}  # compose WireMock; real Karza = URL+cred swap
        auth-type: OAUTH_BEARER
    # ALLOW-LIST (correction #1): only endpoints we registered may be called (anti-SSRF).
    allowed-hosts:
      - echo.mock
      - mock-karza       # step 2 (Karza family — compose WireMock service DNS)
      - karza.mock       # (logical Karza host — real endpoint, D#4)
      - imps.mock        # step 3 (internal IMPS)
    # Classified retry-policy engine (spec v2 §C): exponential backoff + JITTER (never
    # fixed — anti thundering-herd), retry only TRANSIENT (+ idempotent-AMBIGUOUS), then
    # DLQ + notifySfdc. Verifications are idempotent reads.
    retry:
      max-attempts: ${IDFC_VERIFY_MAX_ATTEMPTS:3}
      backoff-millis: ${IDFC_VERIFY_BACKOFF_MILLIS:200}
      max-backoff-millis: ${IDFC_VERIFY_MAX_BACKOFF_MILLIS:5000}
      jitter: ${IDFC_VERIFY_JITTER:true}
    dlq-topic: ${IDFC_VERIFY_DLQ_TOPIC:cap.verification.dlq.v1}
    # Terminal-failure egress: notify SFDC via the SFDC Response capability (§B).
    sfdc-notify-topic: ${IDFC_VERIFY_SFDC_NOTIFY_TOPIC:sfdc.response.notify.v1}

logging:
  level:
    com.idfcfirstbank.integration.capabilities.verification: INFO
