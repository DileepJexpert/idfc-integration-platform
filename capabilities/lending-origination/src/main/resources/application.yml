server:
  port: ${SERVER_PORT:8094}   # capability

spring:
  application:
    name: lending-origination
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    consumer:
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      auto-offset-reset: earliest
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.StringSerializer

# FinnOne (loan booking system of record). The real integration is an Oracle
# STORED PROCEDURE over JDBC (SP_FINNONE_SUBMISSION) — NOT HTTP. mock locally,
# real via spring.datasource.* (docker/prod).
idfc:
  lending-origination:
    finnone:
      mode: ${FINNONE_MODE:mock}

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus   # locked down: no env/heapdump/etc.
  endpoint:
    health:
      probes:
        enabled: true

# --- Error/flow tracking (added platform-wide) ----------------------------------
# Readable console pattern incl. the journey correlationId from MDC (when present),
# so errors are easy to trace across services. Levels overridable via env.
logging:
  level:
    root: ${LOG_LEVEL_ROOT:INFO}
    com.idfcfirstbank: ${LOG_LEVEL_APP:INFO}
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} %-5level [${spring.application.name:-app}] [%X{correlationId:-}] %logger{36} - %msg%n"
