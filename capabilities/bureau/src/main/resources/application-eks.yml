# EKS profile — production posture. Infra ENDPOINTS come from the cluster
# (deploy/eks ConfigMap + Secret -> env vars, consumed by the ${...}
# placeholders in application.yml). This file sets the production
# BEHAVIOUR: real vendors, durable engine state, real datasources.

idfc:
  bureau:
    cibil:
      mode: real
      url: ${CIBIL_URL}
    multi-bureau:
      mode: real
      url: ${MULTI_BUREAU_URL}
    commercial:
      mode: real
      url: ${COMMERCIAL_URL}
