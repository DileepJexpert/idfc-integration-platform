server:
  port: ${SERVER_PORT:8110}   # device-validation capability (health/metrics only)

spring:
  application:
    name: device-validation
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    consumer:
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      auto-offset-reset: earliest
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.StringSerializer

# ---------------------------------------------------------------------------
# THE BRAND TABLE. In the legacy estate each of these was a per-brand config
# file consumed by a dedicated service. Here: rows against ONE capability + ONE
# journey. Device VALIDATION runs up to three activities — validate / block /
# unblock — and each runs only on the INTERSECTION of:
#   * what the REQUEST asks for — the status field maps to activities:
#       status "1" (disbursal) = validate + block;  status "2" (closure) = unblock
#     (the mapping is data — see request-status/status-activities below), and
#   * what the BRAND supports — the row's validate / block / unblock flags.
# A row also says HOW the device is identified (validate-by: imei | serial), the
# auth SCHEME (real BASIC/OAUTH/NA), and the per-brand pass-logic field path. The
# vendor is reached over REAL HTTP (the mock-vendors server in dev) — only the
# response DATA is mocked. ADDING A BRAND IS ADDING A ROW.
# ---------------------------------------------------------------------------
device-validation:
  # The vendor is the compose WireMock (mock-devicevalidation) in dev — only its
  # DATA is mocked. Host bootRun -> localhost:9106; in-container -> http://mock-devicevalidation:8080.
  vendor-base-url: ${DEVICE_VALIDATION_VENDOR_URL:http://localhost:9106/vendor/device-validation}
  token-url: ${DEVICE_VALIDATION_OAUTH_URL:http://localhost:9106/oauth/token}
  connect-timeout-ms: 3000
  read-timeout-ms: 10000
  # The request's activity-intent lives in this field; absent -> default-status.
  status-field: status
  default-status: "1"
  # SFDC status -> the activities the request is asking for (data, not code).
  # Intersected per brand with the validate/block/unblock flags below.
  status-activities:
    "1": [validate, block]   # disbursal: validate the device, then block it
    "2": [unblock]           # closure: unblock the device
  # svcName (SFDC SVCNAME__c = envelope type) -> brand row. The REAL SFDC door
  # carries brand IMPLICITLY in the svcName; the payload has no brand field. A
  # Kafka door still sends brand in the payload directly (this map is only the
  # fallback). Siblings (other brands / a pre-disbursal svcName) are added as
  # ROWS as IDFC confirms them — do NOT invent svcNames.
  brands:
    # Apple post-disbursal (the REAL SFDC front door). The real request carries
    # NO brand field — brand is implicit in the svcName, so this row declares its
    # svc-name (Post_Disbursal_Apple) and the capability derives brand=APPLE.
    # Post-disbursal = block only, so validate=false/block=true/unblock=false. The
    # device is identified by imei. auth-type/pass-path/pass-value are PLACEHOLDERS
    # for the mock vendor — swap to Apple's real host + contract when IDFC confirms.
    APPLE:
      svc-name: Post_Disbursal_Apple
      validate: false
      block: true
      unblock: false
      validate-by: imei
      auth-type: OAUTH
      pass-path: respCode
      pass-value: "0"
      scope: device-validation.apple
    # Full lifecycle: validate + block on disbursal, unblock on closure.
    SAMSUNG:
      validate: true
      block: true
      unblock: true
      validate-by: imei
      auth-type: OAUTH          # real client-credentials: fetch token, then Bearer
      pass-path: respCode
      pass-value: "0"
      scope: device-validation.samsung
    # Appliance brand: identified by SERIAL, block-only, no vendor auth.
    GODREJ:
      validate: false
      block: true
      unblock: false
      validate-by: serial
      auth-type: NA             # legacy: no auth
      pass-path: status
      pass-value: OK
    # Appliance brand: identified by SERIAL, full lifecycle, real Basic auth.
    BOSCH:
      validate: true
      block: true
      unblock: true
      validate-by: serial
      auth-type: BAUTH          # legacy spelling; real Basic auth header
      pass-path: result.code    # the per-brand pass-logic FIELD PATH differs
      pass-value: S
      basic-user: bosch-demo
      basic-password: bosch-secret

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  endpoint:
    health:
      probes:
        enabled: true

logging:
  level:
    root: ${LOG_LEVEL_ROOT:INFO}
    com.idfcfirstbank: ${LOG_LEVEL_APP:INFO}
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} %-5level [${spring.application.name:-app}] [%X{correlationId:-}] %logger{36} - %msg%n"
