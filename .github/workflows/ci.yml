# A5: the platform gate. The FULL Gradle suite runs on every push/PR — it
# includes the journey contract fixture lock (JourneyContractLoaderTest parses
# the committed *.journey.json bytes and the fail-closed loader tests), the
# registry/engine seam ITs, and the ops read-window tests. No subsets: the
# NUL-byte lesson — a test that never runs proves nothing.
name: ci

on:
  push:
    branches: ["main", "claude/**"]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - uses: gradle/actions/setup-gradle@v4

      - name: Full test suite
        run: ./gradlew test --no-daemon

      - name: Publish test report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: test-reports
          path: "**/build/reports/tests/test/"
          retention-days: 7
