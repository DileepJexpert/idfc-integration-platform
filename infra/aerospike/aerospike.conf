# Minimal single-node Aerospike config for LOCAL Slice 1 development.
# The 'idfc' namespace backs the idempotency set. CREATE_ONLY (insert-if-absent)
# and generation-based CAS work on this single-node setup.
#
# OPS CONFIRM (production): run the idempotency namespace as a
# strong-consistency (SC) namespace on a real cluster so CREATE_ONLY +
# generation-check remain atomic under partition/cluster reconfiguration.
# See README "Aerospike ops confirm".

service {
    cluster-name idfc-slice1
}

logging {
    console {
        context any info
    }
}

network {
    service {
        address any
        port 3000
    }
    heartbeat {
        mode multicast
        multicast-group 239.1.99.222
        port 9918
        interval 150
        timeout 10
    }
    fabric {
        port 3001
    }
    info {
        port 3003
    }
}

namespace idfc {
    replication-factor 1
    nsup-period 120          # namespace supervisor sweeps expired (TTL'd) records
    storage-engine memory {
        data-size 1G
    }
    default-ttl 30D          # default record TTL; overridden per-write by the store
}
