# Dockerized MOCK VENDOR SERVERS for the demo. Standalone containers the
# capability adapters call over the wire — real protocol/contract, fixture
# responses. NOT in-app mocks.
#
# Use standalone:  docker compose -f infra/mock-vendors/docker-compose.mock-vendors.yml up -d
# Or included from the root compose (see docker-compose.yml).
#
# Ports (host:container) and the capability that calls each:
#   mock-posidex  9101 -> customer-party  (POST /posidex/resolve)
#   mock-cibil    9102 -> bureau          (POST /cibil/report)   high & low fixtures
#   mock-fico     9103 -> scoring         (POST /fico/score)
#   mock-nsdl     9104 -> kyc             (POST /nsdl/verify)
#   mock-finnone  1521 -> lending-origination (Oracle SP_FINNONE_SUBMISSION via JDBC)

services:
  mock-posidex:
    image: wiremock/wiremock:3.9.1
    command: ["--port", "8080", "--disable-banner"]
    ports: ["9101:8080"]
    volumes:
      - ./posidex/mappings:/home/wiremock/mappings:ro

  mock-cibil:
    image: wiremock/wiremock:3.9.1
    command: ["--port", "8080", "--disable-banner"]
    ports: ["9102:8080"]
    volumes:
      - ./cibil/mappings:/home/wiremock/mappings:ro

  mock-fico:
    image: wiremock/wiremock:3.9.1
    command: ["--port", "8080", "--disable-banner"]
    ports: ["9103:8080"]
    volumes:
      - ./fico/mappings:/home/wiremock/mappings:ro

  mock-nsdl:
    image: wiremock/wiremock:3.9.1
    command: ["--port", "8080", "--disable-banner"]
    ports: ["9104:8080"]
    volumes:
      - ./nsdl/mappings:/home/wiremock/mappings:ro

  mock-finnone:
    image: gvenzl/oracle-xe:21-slim
    environment:
      ORACLE_PASSWORD: finnone
      APP_USER: finnone
      APP_USER_PASSWORD: finnone
    ports: ["1521:1521"]
    volumes:
      - ./finnone/init:/container-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD", "healthcheck.sh"]
      interval: 10s
      timeout: 5s
      retries: 20
