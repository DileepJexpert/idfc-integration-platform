# INFRA + external-vendor mocks — all PULL-ONLY images (no local build needed).
# Bring this up first; it is long-lived. Services connect to it over the shared
# `idfc` network by hostname (kafka, aerospike, mock-*).
#
#   docker compose -f docker-compose.infra.yml up -d
#
# With infra up you can run the IDFC services either as containers
# (docker-compose.services.yml) OR straight from your IDE / `./gradlew bootRun`.
#
# Host ports: kafka 9092 + 29092 · aerospike 3000-3002 · mock-posidex 9101 ·
# mock-cibil 9102 · mock-fico 9103 · mock-nsdl 9104 · mock-finnone(Oracle) 1521.

networks:
  idfc:
    name: idfc          # a stable, shared docker network both compose files attach to

services:
  aerospike:
    image: aerospike/aerospike-server:7.2.0.1
    container_name: idfc-aerospike
    networks: [idfc]
    ports:
      - "3000:3000"
      - "3001:3001"
      - "3002:3002"
    command: ["--config-file", "/etc/aerospike/aerospike.conf"]
    volumes:
      - ./infra/aerospike/aerospike.conf:/etc/aerospike/aerospike.conf:ro
    healthcheck:
      test: ["CMD", "asinfo", "-v", "status"]
      interval: 5s
      timeout: 3s
      retries: 20

  kafka:
    image: apache/kafka:3.8.0
    container_name: idfc-kafka
    networks: [idfc]
    ports:
      - "9092:9092"     # in-cluster listener (also reachable from host as localhost:9092)
      - "29092:29092"   # host listener for host-run tools/tests / bootRun
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: INTERNAL://0.0.0.0:9092,HOST://0.0.0.0:29092,CONTROLLER://0.0.0.0:9093
      KAFKA_ADVERTISED_LISTENERS: INTERNAL://kafka:9092,HOST://localhost:29092
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@localhost:9093
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,INTERNAL:PLAINTEXT,HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: INTERNAL
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      CLUSTER_ID: idfc-slice1-cluster-0001
    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-topics.sh --bootstrap-server localhost:9092 --list || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 20

  # --- external-vendor mocks (WireMock + Oracle-XE; real protocol, fixtures) ------

  mock-posidex:
    image: wiremock/wiremock:3.9.1
    container_name: idfc-mock-posidex
    networks: [idfc]
    command: ["--port", "8080", "--disable-banner"]
    ports: ["9101:8080"]
    volumes:
      - ./infra/mock-vendors/posidex/mappings:/home/wiremock/mappings:ro

  mock-cibil:
    image: wiremock/wiremock:3.9.1
    container_name: idfc-mock-cibil
    networks: [idfc]
    command: ["--port", "8080", "--disable-banner"]
    ports: ["9102:8080"]
    volumes:
      - ./infra/mock-vendors/cibil/mappings:/home/wiremock/mappings:ro

  mock-fico:
    image: wiremock/wiremock:3.9.1
    container_name: idfc-mock-fico
    networks: [idfc]
    command: ["--port", "8080", "--disable-banner"]
    ports: ["9103:8080"]
    volumes:
      - ./infra/mock-vendors/fico/mappings:/home/wiremock/mappings:ro

  mock-nsdl:
    image: wiremock/wiremock:3.9.1
    container_name: idfc-mock-nsdl
    networks: [idfc]
    command: ["--port", "8080", "--disable-banner"]
    ports: ["9104:8080"]
    volumes:
      - ./infra/mock-vendors/nsdl/mappings:/home/wiremock/mappings:ro

  mock-finnone:
    image: gvenzl/oracle-xe:21-slim
    container_name: idfc-mock-finnone
    networks: [idfc]
    environment:
      ORACLE_PASSWORD: finnone
      APP_USER: finnone
      APP_USER_PASSWORD: finnone
    ports: ["1521:1521"]
    volumes:
      - ./infra/mock-vendors/finnone/init:/container-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD", "healthcheck.sh"]
      interval: 10s
      timeout: 5s
      retries: 20
