# Local runtime for Slice 1. ONLY the two real datastores the edge depends on:
# Aerospike (idempotency store) and Kafka (canonical-envelope transport).
# Everything beyond the edge (Salesforce, Hydra, Kong, S3, FinnOne) is mocked
# in-process via Spring profiles — no other containers are needed or wanted.
services:
  aerospike:
    image: aerospike/aerospike-server:7.2.0.1
    container_name: idfc-aerospike
    ports:
      - "3000:3000"   # service
      - "3001:3001"   # fabric
      - "3002:3002"   # heartbeat
    # Single-node config with a namespace named 'idfc'. The idempotency set uses
    # CREATE_ONLY + generation-CAS, both supported here. See README "Ops confirm"
    # for the strong-consistency recommendation in a real cluster.
    command:
      - "--config-file"
      - "/etc/aerospike/aerospike.conf"
    volumes:
      - ./infra/aerospike/aerospike.conf:/etc/aerospike/aerospike.conf:ro
    healthcheck:
      test: ["CMD", "asinfo", "-v", "status"]
      interval: 5s
      timeout: 3s
      retries: 20

  kafka:
    image: apache/kafka:3.8.0
    container_name: idfc-kafka
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@localhost:9093
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      CLUSTER_ID: idfc-slice1-cluster-0001
    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-topics.sh --bootstrap-server localhost:9092 --list || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 20
