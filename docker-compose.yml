# All-in-one convenience: infra (Aerospike + Kafka + vendor mocks) PLUS the IDFC
# services, as one stack. This is just an include of the two layers — use the
# individual files when you want them separately:
#
#   infra only (pull-only, no build):   docker compose -f docker-compose.infra.yml up -d
#   services only (need bootBuildImage): docker compose -f docker-compose.services.yml up -d
#   everything:                          docker compose up -d      (this file)
#
# `./gradlew bootBuildImage` must have built the idfc/* images first for the
# services to start. See docs/DEMO.md and ./demo.sh.

include:
  - docker-compose.infra.yml
  - docker-compose.services.yml
