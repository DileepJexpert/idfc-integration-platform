# Full demo runtime: real infra (Aerospike, Kafka) + every IDFC service +
# the Dockerized mock vendor servers. Each capability's vendor URL/datasource
# points at a mock container; topics flow edge -> engine -> capabilities ->
# branch -> decision.
#
# Build the service images once (Spring Boot buildpacks), then bring it up:
#   ./gradlew bootBuildImage
#   docker compose up -d
# See README "Demo" for the curl scripts (approved / rejected) and the burst.

include:
  - infra/mock-vendors/docker-compose.mock-vendors.yml

services:
  aerospike:
    image: aerospike/aerospike-server:7.2.0.1
    container_name: idfc-aerospike
    ports:
      - "3000:3000"
      - "3001:3001"
      - "3002:3002"
    command: ["--config-file", "/etc/aerospike/aerospike.conf"]
    volumes:
      - ./infra/aerospike/aerospike.conf:/etc/aerospike/aerospike.conf:ro
    healthcheck:
      test: ["CMD", "asinfo", "-v", "status"]
      interval: 5s
      timeout: 3s
      retries: 20

  kafka:
    image: apache/kafka:3.8.0
    container_name: idfc-kafka
    ports:
      - "9092:9092"     # in-cluster listener (also reachable from host as localhost:9092)
      - "29092:29092"   # host listener for host-run tools/tests
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      # Two PLAINTEXT listeners: INTERNAL (containers reach kafka:9092) + HOST (localhost:29092).
      KAFKA_LISTENERS: INTERNAL://0.0.0.0:9092,HOST://0.0.0.0:29092,CONTROLLER://0.0.0.0:9093
      KAFKA_ADVERTISED_LISTENERS: INTERNAL://kafka:9092,HOST://localhost:29092
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@localhost:9093
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,INTERNAL:PLAINTEXT,HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: INTERNAL
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      CLUSTER_ID: idfc-slice1-cluster-0001
    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-topics.sh --bootstrap-server localhost:9092 --list || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 20

  # --- IDFC services (images built by `./gradlew bootBuildImage`) ----------------

  sfdc-ingress-edge:
    image: idfc/sfdc-ingress-edge:0.1.0-SNAPSHOT
    container_name: idfc-sfdc-ingress-edge
    depends_on:
      kafka: { condition: service_healthy }
      aerospike: { condition: service_healthy }
    ports:
      - "8080:8080"
    environment:
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      IDFC_AEROSPIKE_HOST: aerospike

  origination-journey:
    image: idfc/origination-journey:0.1.0-SNAPSHOT
    container_name: idfc-origination-journey
    depends_on:
      kafka: { condition: service_healthy }
    environment:
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      IDFC_ENGINE_ORIGINATION_TOPICS: orig.sfdc.pl.v1,orig.sfdc.lap.v1,orig.sfdc.bl.v1,orig.sfdc.commercial.v1

  customer-party:
    image: idfc/customer-party:0.1.0-SNAPSHOT
    container_name: idfc-customer-party
    depends_on:
      kafka: { condition: service_healthy }
    environment:
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      POSIDEX_MODE: real
      POSIDEX_URL: http://mock-posidex:8080

  kyc:
    image: idfc/kyc:0.1.0-SNAPSHOT
    container_name: idfc-kyc
    depends_on:
      kafka: { condition: service_healthy }
    environment:
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      NSDL_MODE: real
      NSDL_URL: http://mock-nsdl:8080

  bureau:
    image: idfc/bureau:0.1.0-SNAPSHOT
    container_name: idfc-bureau
    depends_on:
      kafka: { condition: service_healthy }
    environment:
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      CIBIL_MODE: real
      CIBIL_URL: http://mock-cibil:8080

  scoring:
    image: idfc/scoring:0.1.0-SNAPSHOT
    container_name: idfc-scoring
    depends_on:
      kafka: { condition: service_healthy }
    environment:
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      FICO_MODE: real
      FICO_URL: http://mock-fico:8080
      SCORING_THRESHOLD: "700"

  lending-origination:
    image: idfc/lending-origination:0.1.0-SNAPSHOT
    container_name: idfc-lending-origination
    depends_on:
      kafka: { condition: service_healthy }
      mock-finnone: { condition: service_healthy }
    environment:
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      FINNONE_MODE: real
      SPRING_DATASOURCE_URL: jdbc:oracle:thin:@mock-finnone:1521/XEPDB1
      SPRING_DATASOURCE_USERNAME: finnone
      SPRING_DATASOURCE_PASSWORD: finnone
      SPRING_DATASOURCE_DRIVER_CLASS_NAME: oracle.jdbc.OracleDriver
