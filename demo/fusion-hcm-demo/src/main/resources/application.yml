server:
  port: ${SERVER_PORT:8111}   # DEMO fusion-hcm capability + file edge (health/metrics only)

spring:
  application:
    name: fusion-hcm-demo
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    consumer:
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      auto-offset-reset: earliest
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.StringSerializer

# The mocked Fusion HCM vendor — reached over REAL HTTP (only its response DATA
# is mocked, on the mock-vendors server). Real client + timeouts + status→class.
demo:
  fusion:
    # The Fusion HCM vendor is the compose WireMock (mock-fusion) — only its DATA
    # is mocked. Host bootRun -> localhost:9107; in-container -> http://mock-fusion:8080.
    base-url: ${DEMO_FUSION_URL:http://localhost:9107/vendor/fusion}
    connect-timeout-ms: 3000
    read-timeout-ms: 10000
  # DEMO file edge (NOT the production SFTP edge — census-gated). Disabled by
  # default: turn on with --demo.batch.enabled=true (see demo/README.md).
  batch:
    enabled: ${DEMO_BATCH_ENABLED:false}
    inbox-dir: ${DEMO_BATCH_INBOX:demo/batch-inbox}
    poll-ms: 2000
    origination-topic: orig.demo.hr.v1
    type: EMPLOYEE_LWD_UPDATE
    org-id: HR-DEMO

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  endpoint:
    health:
      probes:
        enabled: true

logging:
  level:
    root: ${LOG_LEVEL_ROOT:INFO}
    com.idfcfirstbank: ${LOG_LEVEL_APP:INFO}
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} %-5level [${spring.application.name:-app}] [%X{correlationId:-}] %logger{36} - %msg%n"
