# LOCAL profile — run this service on your machine against the
# docker-compose infra:  docker compose -f docker-compose.infra.yml up -d
# Kafka is reached via the HOST listener (29092); the INTERNAL listener
# (kafka:9092) only resolves inside the docker network.

spring:
  kafka:
    bootstrap-servers: localhost:29092

idfc:
  engine:
    # Journeys from the LOCAL journey-registry (run :platform:journey-registry
    # with the local profile first) — flip to "classpath" to run without it.
    journey-source: ${IDFC_ENGINE_JOURNEY_SOURCE:registry}
    registry:
      base-url: http://localhost:8104
      auth-token: dev-registry-token   # DEV ONLY — matches the registry's local profile
    # Durable run state against the docker Aerospike (audit source-of-truth).
    state-store: aerospike
    aerospike:
      host: localhost
      port: 3000
