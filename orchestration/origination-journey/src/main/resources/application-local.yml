# LOCAL profile — run this service on your machine against the
# docker-compose infra:  docker compose -f docker-compose.infra.yml up -d
# Kafka is reached via the HOST listener (29092); the INTERNAL listener
# (kafka:9092) only resolves inside the docker network.

spring:
  kafka:
    bootstrap-servers: localhost:29092

idfc:
  engine:
    # Journeys from the LOCAL journey-registry (run :platform:journey-registry
    # with the local profile first) — flip to "classpath" to run without it.
    journey-source: ${IDFC_ENGINE_JOURNEY_SOURCE:registry}
    registry:
      base-url: http://localhost:8104
      auth-token: dev-registry-token   # DEV ONLY — matches the registry's local profile
    # Durable run state against the docker Aerospike (audit source-of-truth).
    state-store: aerospike
    aerospike:
      host: localhost
      port: 3000
    # Demo journeys/doors are available on LOCAL too — no separate 'demo'
    # profile needed. Lists REPLACE across profiles, so the base
    # loan-origination entry is repeated here alongside the demo journeys;
    # the type-to-journey MAP merges with the base rows in application.yml.
    journey-resources:
      - journeys/loan-origination.journey.json
      - journeys/device-financing.journey.json
      - journeys/employee-lwd-update.journey.json
      - journeys/vehicle-rc-verification.journey.json
    origination-topics: ${IDFC_ENGINE_ORIGINATION_TOPICS:orig.sfdc.pl.v1,orig.sfdc.lap.v1,orig.sfdc.bl.v1,orig.sfdc.commercial.v1,orig.demo.device.v1,orig.demo.hr.v1}
    type-to-journey:
      DEVICE_FINANCING: device-financing
      EMPLOYEE_LWD_UPDATE: employee-lwd-update
      # Karza VAHAN-RC verification journey. Routing lives here (config), not in
      # the registry — the journey is seeded/loadable but stays unroutable until
      # a type maps to it, so publish origination envelopes with type=VEHICLE_RC.
      VEHICLE_RC: vehicle-rc-verification

  # DEV ONLY ops-window token (the base profile fails closed without one).
  ops:
    auth-token: dev-ops-token
