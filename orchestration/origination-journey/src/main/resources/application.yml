spring:
  application:
    name: origination-journey
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    consumer:
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      auto-offset-reset: earliest
      properties:
        # Discover pattern-matched cap.*.response.v1 topics promptly.
        metadata.max.age.ms: 2000
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.StringSerializer

# Engine config-as-data: the loaded journeys, the decision topic, and the
# businessLine(type) -> journey routing (empty => use the single loaded journey).
idfc:
  engine:
    journey-resources:
      - journeys/loan-origination.journey.json
    decision-topic: orig.decision.v1
    origination-topics: orig.sfdc.pl.v1
    type-to-journey: {}

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus   # locked down: no env/heapdump/etc.
  endpoint:
    health:
      probes:
        enabled: true
