server:
  port: ${SERVER_PORT:8082}   # the engine (DAG sequencer)

spring:
  application:
    name: origination-journey
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    consumer:
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      auto-offset-reset: earliest
      properties:
        # Discover pattern-matched cap.*.response.v1 topics promptly.
        metadata.max.age.ms: 2000
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.StringSerializer

# Engine config-as-data: the journey SOURCE, the loaded journeys, the decision
# topic, and the businessLine(type) -> journey routing.
idfc:
  engine:
    # WHERE journeys come from — exactly one source of truth (A2):
    #   "registry"  = the journey-registry service: what a checker publishes in
    #                 the DAG Designer is what this engine runs (+ scheduled
    #                 refresh; in-flight runs stay pinned to their version).
    #   "classpath" = the JAR's journeys/ files — explicit Docker-free bootstrap
    #                 fallback (flagged at startup; cannot serve historical
    #                 versions to pinned runs).
    journey-source: ${IDFC_ENGINE_JOURNEY_SOURCE:classpath}
    journey-resources:
      - journeys/loan-origination.journey.json
    registry:
      base-url: ${JOURNEY_REGISTRY_URL:}
      # FAIL CLOSED in registry mode: no token, no boot (dev value via local profile).
      auth-token: ${REGISTRY_AUTH_TOKEN:}
      refresh-seconds: ${JOURNEY_REGISTRY_REFRESH_SECONDS:30}
      connect-timeout-ms: 3000
      read-timeout-ms: 10000
    decision-topic: orig.decision.v1
    # Consume EVERY origination topic the edges route to (PL/LAP/BL/Commercial),
    # not just PL — otherwise a non-PL request is ACKed by the edge and then sits
    # unprocessed. Override with IDFC_ENGINE_ORIGINATION_TOPICS (CSV).
    origination-topics: ${IDFC_ENGINE_ORIGINATION_TOPICS:orig.sfdc.pl.v1,orig.sfdc.lap.v1,orig.sfdc.bl.v1,orig.sfdc.commercial.v1}
    # Routing is EXPLICIT and fail-closed (A2): an inbound type with no row here
    # goes to the DLQ as poison — it never silently runs some default journey.
    # Adding a business line is a config row, not a code change.
    type-to-journey:
      PERSONAL_LOAN: loan-origination
      LAP: loan-origination
      BUSINESS_LOAN: loan-origination
      COMMERCIAL: loan-origination
      # Inbound_Wrapper is SFDC's CASA account-creation SVCNAME. Pre-A2 it ran
      # loan-origination via the SILENT empty-map fallback; now that routing is
      # an EXPLICIT, reviewable row (kept for the end-to-end plumbing demo).
      # Pointing it at a real account-creation journey is this one-row swap.
      Inbound_Wrapper: loan-origination
    # Journey-instance state: "in-memory" (default, Docker-free) or "aerospike"
    # (durable — the engine is the audit source-of-truth for what ran).
    state-store: ${IDFC_ENGINE_STATE_STORE:in-memory}
    # Run-lifecycle events for the observability stack (ids only, never payload).
    ops-events-topic: ops.journey.events.v1
    aerospike:
      host: ${AEROSPIKE_HOST:localhost}
      port: ${AEROSPIKE_PORT:3000}
      namespace: ${AEROSPIKE_NAMESPACE:idfc}
      instance-set: journey_instance
      ttl-seconds: ${JOURNEY_STATE_TTL_SECONDS:604800}

# The audited read-only ops window (/ops/runs...) served from this app.
# FAIL CLOSED: no OPS_API_TOKEN, no boot (dev value via local profile/compose).
# This is a DIFFERENT secret from the registry token by design (D14).
idfc.ops:
  auth-token: ${OPS_API_TOKEN:}
  cors-allowed-origin-patterns:
    - ${OPS_CORS_ORIGIN:http://localhost:[*]}

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus   # locked down: no env/heapdump/etc.
  endpoint:
    health:
      probes:
        enabled: true

# --- Error/flow tracking (added platform-wide) ----------------------------------
# Readable console pattern incl. the journey correlationId from MDC (when present),
# so errors are easy to trace across services. Levels overridable via env.
logging:
  level:
    root: ${LOG_LEVEL_ROOT:INFO}
    com.idfcfirstbank: ${LOG_LEVEL_APP:INFO}
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} %-5level [${spring.application.name:-app}] [%X{correlationId:-}] %logger{36} - %msg%n"
