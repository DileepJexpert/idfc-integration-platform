# Single-node Aerospike config for the Testcontainers concurrency gate.
# Mounted as the image template so the entrypoint renders it verbatim.
# access-address 127.0.0.1 plus a fixed 3000:3000 mapping make the node
# advertise a host-reachable address to the test client.
# proto-fd-max is small to fit the sandbox 1024 fd ulimit.
# memory storage keeps the node light and fast for tests.
service {
    cluster-name idfc-test
    proto-fd-max 1024
}
logging {
    console {
        context any info
    }
}
network {
    service {
        address any
        port 3000
        access-address 127.0.0.1
    }
    heartbeat {
        mode mesh
        port 3002
        interval 150
        timeout 10
    }
    fabric {
        port 3001
    }
    info {
        port 3003
    }
}
namespace test {
    replication-factor 1
    nsup-period 60
    storage-engine memory {
        data-size 256M
    }
    default-ttl 0
}
